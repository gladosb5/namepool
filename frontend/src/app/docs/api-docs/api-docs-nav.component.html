<div id="enterprise-cta-desktop" *ngIf="officialNamepoolInstance">
  <p>Get higher API limits with Namepool Enterprise®</p>
  <a class="btn btn-small btn-purple" [href]="[ isNamepoolSpaceBuild ? '/enterprise' : 'http://namepool.bit/enterprise']" [target]="isNamepoolSpaceBuild ? '' : 'blank'">More Info <fa-icon [icon]="['fas', 'angle-right']"></fa-icon></a>
</div>
<div *ngFor="let item of tabData">
  <p *ngIf="( item.type === 'category' ) && ( item.showConditions.indexOf(network.val) > -1 ) && ( !item.hasOwnProperty('options') || ( item.hasOwnProperty('options') && item.options.hasOwnProperty('officialOnly') && item.options.officialOnly && officialNamepoolInstance ))">{{ item.title }}</p>
  <a *ngIf="( item.type !== 'category' ) && ( item.showConditions.indexOf(network.val) > -1 ) && ( !item.hasOwnProperty('options') || ( item.hasOwnProperty('options') && item.options.hasOwnProperty('officialOnly') && item.options.officialOnly && officialNamepoolInstance ) || ( item.hasOwnProperty('options') && item.options.hasOwnProperty('auditOnly') && item.options.auditOnly && auditEnabled ) || ( !item.hasOwnProperty('options') || ( item.hasOwnProperty('options') && item.options.hasOwnProperty('electrsOnly') && item.options.electrsOnly && runningElectrs) ) )" (click)="navLinkClick($event, item.fragment)">{{ item.title }}</a>
</div>
