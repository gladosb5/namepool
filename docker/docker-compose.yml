# Local-only compose setup.
# The application images below are built from this repository and are not published on Docker Hub.

services:
  web:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        commitHash: ${NAMEPOOL_COMMIT_HASH:-local}
    environment:
      FRONTEND_HTTP_PORT: "8080"
      BACKEND_MAINNET_HTTP_HOST: "api"
    image: namepool/frontend:local
    pull_policy: never
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    command: "./wait-for db:3306 --timeout=720 -- nginx -g 'daemon off;'"
    ports:
      - 80:8080
  api:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      args:
        commitHash: ${NAMEPOOL_COMMIT_HASH:-local}
    environment:
      # Optional: used for fetching Namecoin (NMC) fiat prices from CoinMarketCap.
      COINMARKETCAP_API_KEY: "${COINMARKETCAP_API_KEY:-}"
      MEMPOOL_BACKEND: "none"
      CORE_RPC_HOST: "172.27.0.1"
      CORE_RPC_PORT: "8332"
      CORE_RPC_USERNAME: "mempool"
      CORE_RPC_PASSWORD: "mempool"
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "db"
      DATABASE_DATABASE: "mempool"
      DATABASE_USERNAME: "mempool"
      DATABASE_PASSWORD: "mempool"
      STATISTICS_ENABLED: "true"
    image: namepool/backend:local
    pull_policy: never
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    command: "./wait-for-it.sh db:3306 --timeout=720 --strict -- ./start.sh"
    volumes:
      - ./data:/backend/cache
  db:
    environment:
      MYSQL_DATABASE: "mempool"
      MYSQL_USER: "mempool"
      MYSQL_PASSWORD: "mempool"
      MYSQL_ROOT_PASSWORD: "admin"
      MARIADB_AUTO_UPGRADE: "1"
    image: mariadb:10.5.21
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ./mysql/data:/var/lib/mysql
